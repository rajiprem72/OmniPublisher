<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>OmniPublisher | Create Once. Publish Anywhere.</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Our CSS -->

    <link rel="stylesheet"
          href="assets/css/style.css">

</head>

<body>

<div class="wrapper">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">

            <h2>OmniPublisher</h2>

            <p>Create Once.<br>Publish Anywhere.</p>

        </div>

        <ul class="menu">

            <li class="active">
                <i class="bi bi-speedometer2"></i>
                Dashboard
            </li>

            <li>
                <i class="bi bi-plus-circle"></i>
                New Post
            </li>

            <li>
                <i class="bi bi-collection-play"></i>
                Channels
            </li>

            <li>
                <i class="bi bi-share"></i>
                Platforms
            </li>

            <li>
                <i class="bi bi-clock-history"></i>
                History
            </li>

            <li>
                <i class="bi bi-bar-chart"></i>
                Analytics
            </li>

            <li>
                <i class="bi bi-gear"></i>
                Settings
            </li>

            <li>
                <i class="bi bi-question-circle"></i>
                Help
            </li>

        </ul>

        <div class="version">

            Version 1.0.0

        </div>

    </aside>

    <!-- Main -->

    <main class="content">

        <header class="topbar">

            <div>

                <h3>Dashboard</h3>

            </div>

            <div>

                <button class="btn btn-primary">

                    <i class="bi bi-plus-circle"></i>

                    New Post

                </button>

            </div>

        </header>

        <section class="workspace">
             <div id="contentArea">

                    <!-- Dynamic page will be loaded here -->

             </div>

        </section>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="assets/js/app.js"></script>

</body>

</html>
